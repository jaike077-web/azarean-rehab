# =====================================================
# Nginx server block для Azarean Rehab (production)
# Домен: my.azarean.ru  (frontend + API через один origin)
# VDS: 185.93.109.234 (shared с JARVIS)
# Путь на сервере: /opt/azarean-rehab/
#
# Устанавливается в /etc/nginx/sites-available/my.azarean.ru
# Симлинк: /etc/nginx/sites-enabled/my.azarean.ru
# -----------------------------------------------------
# SSL: добавляется через `certbot --nginx -d my.azarean.ru`
# после первого успешного запуска HTTP-блока ниже.
# =====================================================

# ─── HTTP → HTTPS redirect (кроме ACME challenge) ───
server {
    listen 80;
    listen [::]:80;
    server_name my.azarean.ru;

    # Let's Encrypt — certbot читает challenge-файлы без редиректа.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — основной блок ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name my.azarean.ru;

    # SSL-конфиг certbot допишет сюда при первом запуске
    # ssl_certificate /etc/letsencrypt/live/my.azarean.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/my.azarean.ru/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    # HSTS выставляем ТОЛЬКО после подтверждённой работы HTTPS (certbot)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Логи ───
    access_log /var/log/nginx/my.azarean.ru.access.log;
    error_log  /var/log/nginx/my.azarean.ru.error.log;

    # ─── Лимиты тела запроса (для аватаров и фото дневника) ───
    # Backend ограничивает до 10 МБ сам, nginx не должен резать раньше.
    client_max_body_size 12M;

    # ─── Статический фронтенд (React CRA build) ───
    root /opt/azarean-rehab/frontend/build;
    index index.html;

    # CRA SPA routing — все незнакомые пути → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Кэш для HTML — не кешировать (чтобы новые деплои подхватывались)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # CRA статические ассеты (JS, CSS, images) — долгий кэш + immutable
    # (filename contains hash, безопасно)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Manifest, service-worker, favicon — короткий кэш
    location = /manifest.json { expires 1h; }
    location = /sw.js         { expires 1h; }
    location = /favicon.ico   { expires 7d; access_log off; }

    # ─── API proxy → Express на localhost:3001 ───
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Правильные заголовки для Express trustProxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies должны проходить «как есть» (Secure+httpOnly)
        proxy_pass_request_headers on;

        # Таймауты — default nginx 60s ок для REST;
        # apload фото может быть медленным → 120s
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # WebSocket upgrade (на будущее, не используется сейчас)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Запретить прямой доступ к скрытым файлам ───
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# =====================================================
# Nginx server block для Azarean Rehab (production)
# Домен: my.azarean.ru  (frontend + API через один origin)
# VDS: 185.93.109.234 (shared с JARVIS)
# Путь на сервере: /opt/azarean-rehab/
#
# Устанавливается в /etc/nginx/sites-available/my.azarean.ru
# Симлинк: /etc/nginx/sites-enabled/my.azarean.ru
# -----------------------------------------------------
# BOOTSTRAP СТРАТЕГИЯ:
#   1. Изначально файл содержит ТОЛЬКО :80 server block с полной
#      конфигурацией (SPA, /api proxy, security headers).
#   2. `certbot --nginx --redirect -d my.azarean.ru` сделает:
#      - Добавит дубликат server { listen 443 ssl http2; ... } с теми
#        же location-блоками + ssl_certificate паш
#      - Заменит :80 block на redirect 80→443
#   3. После certbot nginx -t проходит, рестарт reload.
#
# HSTS не ставим в :80 (бесполезно до HTTPS). После certbot
# руками можно добавить: add_header Strict-Transport-Security
# "max-age=31536000; includeSubDomains" always; в :443 блок.
# =====================================================

server {
    listen 80;
    listen [::]:80;
    server_name my.azarean.ru;

    # ─── Security headers (сработают и на HTTPS после certbot-copy) ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # ─── Логи ───
    access_log /var/log/nginx/my.azarean.ru.access.log;
    error_log  /var/log/nginx/my.azarean.ru.error.log;

    # ─── Лимит тела запроса (аватары и фото дневника до 10 МБ) ───
    client_max_body_size 12M;

    # ─── Let's Encrypt ACME challenge (resolves до получения cert) ───
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── Статический фронтенд (React CRA build) ───
    root /opt/azarean-rehab/frontend/build;
    index index.html;

    # CRA SPA routing — все незнакомые пути → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Кэш для HTML — не кешировать (чтобы новые деплои подхватывались)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # CRA статические ассеты (JS, CSS, images) — долгий кэш + immutable
    # (filename contains hash — безопасно)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Manifest, service-worker, favicon — короткий кэш
    location = /manifest.json { expires 1h; }
    location = /sw.js         { expires 1h; }
    location = /favicon.ico   { expires 7d; access_log off; }

    # ─── API proxy → Express на localhost:3001 ───
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Правильные заголовки для Express trustProxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies должны проходить «как есть» (Secure+httpOnly)
        proxy_pass_request_headers on;

        # Таймауты — default nginx 60s ок для REST;
        # upload фото может быть медленным → 120s
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # WebSocket upgrade (на будущее, не используется сейчас)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Запретить прямой доступ к скрытым файлам ───
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
